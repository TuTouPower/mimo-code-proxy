services:
  mimo-proxy:
    build: .
    container_name: mimo-proxy
    restart: unless-stopped
    ports:
      - "8788:8788"
    environment:
      - MIMO_CONFIG=/app/mimo_config.json
      - MIMO_LOG_LEVEL=INFO
      - MIMO_FREE_BASE_URL=${MIMO_FREE_BASE_URL:-https://api.xiaomimimo.com}
    volumes:
      - ./mimo_config.json:/app/mimo_config.json:ro
      - mimo-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mimo-data:
